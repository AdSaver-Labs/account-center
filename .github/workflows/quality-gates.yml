name: Account Center quality gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  qa:
    name: QA / Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Install Chromium for protected browser gate
        run: npx playwright install --with-deps chromium
      - name: Functional, type, build, browser, accessibility gate
        run: npm run qa
      - name: Dependency and tracked-secret gate
        run: npm run qa:security
